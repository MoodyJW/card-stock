<div class="app-layout-container">
  @if (isMobile()) {
    <!-- Mobile Layout -->
    <mat-toolbar class="app-toolbar">
      <span class="app-title">{{ currentShopName() }}</span>
      <span class="spacer"></span>
      <app-user-menu class="mobile-user-menu"></app-user-menu>

      <button mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        @if (shopBasePath(); as basePath) {
          <button mat-menu-item [routerLink]="basePath + '/dashboard'">
            <mat-icon>dashboard</mat-icon>
            <span>Dashboard</span>
          </button>
          <button mat-menu-item [routerLink]="basePath + '/inventory'">
            <mat-icon>inventory_2</mat-icon>
            <span>Inventory</span>
          </button>
          <button mat-menu-item [routerLink]="basePath + '/team'">
            <mat-icon>group</mat-icon>
            <span>Team</span>
          </button>
          <button mat-menu-item [routerLink]="basePath + '/settings'">
            <mat-icon>settings</mat-icon>
            <span>Shop Settings</span>
          </button>
          <mat-divider></mat-divider>
        }
        <button mat-menu-item routerLink="/shop/select">
          <mat-icon>swap_horiz</mat-icon>
          <span>Switch Store</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="content" [class.has-bottom-bar]="shopBasePath()">
      <router-outlet></router-outlet>
    </div>

    @if (shopBasePath()) {
      <app-bottom-nav />
    }
  } @else {
    <!-- Desktop Layout -->
    <mat-toolbar class="app-toolbar">
      <button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="spacer"></span>
      <span class="app-title">{{ currentShopName() }}</span>
      <span class="spacer"></span>
      <app-user-menu></app-user-menu>
    </mat-toolbar>

    <mat-sidenav-container class="sidenav-container">
      <mat-sidenav #drawer mode="side" opened class="app-sidenav">
        <mat-nav-list>
          @if (shopBasePath(); as basePath) {
            <a mat-list-item [routerLink]="basePath + '/dashboard'" routerLinkActive="active">
              <mat-icon matListItemIcon>dashboard</mat-icon>
              <span matListItemTitle>Dashboard</span>
            </a>
            <a mat-list-item [routerLink]="basePath + '/inventory'" routerLinkActive="active">
              <mat-icon matListItemIcon>inventory_2</mat-icon>
              <span matListItemTitle>Inventory</span>
            </a>
            <a mat-list-item [routerLink]="basePath + '/team'" routerLinkActive="active">
              <mat-icon matListItemIcon>group</mat-icon>
              <span matListItemTitle>Team Management</span>
            </a>
            <a mat-list-item [routerLink]="basePath + '/settings'" routerLinkActive="active">
              <mat-icon matListItemIcon>settings</mat-icon>
              <span matListItemTitle>Shop Settings</span>
            </a>
            <mat-divider></mat-divider>
          }
          <a
            mat-list-item
            routerLink="/shop/select"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <mat-icon matListItemIcon>swap_horiz</mat-icon>
            <span matListItemTitle>Switch Store</span>
          </a>
        </mat-nav-list>
      </mat-sidenav>

      <mat-sidenav-content class="content">
        <router-outlet></router-outlet>
      </mat-sidenav-content>
    </mat-sidenav-container>
  }
</div>
